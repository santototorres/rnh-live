version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rnh-db
    restart: always
    environment:
      POSTGRES_USER: rnh
      POSTGRES_PASSWORD: rnhpassword
      POSTGRES_DB: rnh_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: rnh-backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://rnh:rnhpassword@db:5432/rnh_db?schema=public"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: rnh-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "https://xtreetx.com/rnh/api"
      NEXT_PUBLIC_SOCKET_URL: "https://xtreetx.com"
      NEXT_PUBLIC_SOCKET_PATH: "/rnh/socket.io"
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: rnh-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
