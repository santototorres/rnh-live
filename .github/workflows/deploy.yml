name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 22022
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }} # O usar key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d "/root/rnh-live" ]; then
              cd /root
              git clone https://github.com/santototorres/rnh-live.git
            fi
            
            cd /root/rnh-live
            git pull origin main
            
            docker compose build backend frontend
            docker compose up -d
